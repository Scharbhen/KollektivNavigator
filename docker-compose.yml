version: '3.8'

services:
  web:
    build:
      context: .
      target: runner-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Use the real extractor pipeline; switch to true only for explicit demo mode.
      - DEMO_MODE=false
      # URL for connecting to the local RabbitMQ container
      - RABBITMQ_URL=amqp://extractor_user:RmqPass_2026_xYz@rabbitmq:5672
      # Queue consumed by the extractor and queue used for responses back to this app.
      - RABBITMQ_TARGET_QUEUE=doc-2-md
      - RABBITMQ_REPLY_QUEUE=demo-responses
      - RABBITMQ_METADATA_QUEUE=doc-2-metadata
      - RABBITMQ_REPLY_QUEUE_DURABLE=true
      # Timeout for RabbitMQ publish confirms in milliseconds.
      - RABBITMQ_PUBLISH_TIMEOUT_MS=10000
      - RABBITMQ_CHAT_TIMEOUT_MS=300000
      # IMPORTANT: Set this to the public URL of your VPS so the extractor can download files
      - NEXT_PUBLIC_BASE_URL=https://navigator.sapsan17.ru
    volumes:
      # Persist uploaded files and leads data
      - uploads_data_v2:/app/public/uploads
      - app_data_v2:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      target: runner-worker
    restart: always
    environment:
      - NODE_ENV=production
      - DEMO_MODE=false
      - RABBITMQ_URL=amqp://extractor_user:RmqPass_2026_xYz@rabbitmq:5672
      - RABBITMQ_REPLY_QUEUE=demo-responses
      - RABBITMQ_REPLY_QUEUE_DURABLE=true
    volumes:
      - app_data_v2:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      # AMQP port exposed to the internet for the extractor to connect
      - "5672:5672"
      # Management UI (Optional: you can comment this out in production for security)
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: extractor_user
      RABBITMQ_DEFAULT_PASS: RmqPass_2026_xYz
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
  uploads_data_v2:
  app_data_v2:
  rabbitmq_data:
