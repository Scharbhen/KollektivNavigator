version: '3.8'

services:
  web:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # URL for connecting to the local RabbitMQ container
      - RABBITMQ_URL=amqp://extractor_user:RmqPass_2026_xYz@rabbitmq:5672
      # IMPORTANT: Set this to the public URL of your VPS so the extractor can download files
      - NEXT_PUBLIC_BASE_URL=http://212.113.98.130
    volumes:
      # Persist uploaded files and leads data
      - uploads_data:/app/public/uploads
      - leads_data:/app/leads_data.json
      - results_data:/app/results_data.json
    depends_on:
      - rabbitmq

  worker:
    build: .
    command: node worker.js
    restart: always
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://extractor_user:RmqPass_2026_xYz@rabbitmq:5672
    volumes:
      - results_data:/app/results_data.json
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      # AMQP port exposed to the internet for the extractor to connect
      - "5672:5672"
      # Management UI (Optional: you can comment this out in production for security)
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: extractor_user
      RABBITMQ_DEFAULT_PASS: RmqPass_2026_xYz
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
  uploads_data:
  leads_data:
  results_data:
  rabbitmq_data:
